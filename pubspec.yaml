name: rakshak
description: AI Safety Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^13.2.0
  
  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  
  # HTTP Client (for web dashboard only)
  dio: ^5.4.0
  http: ^1.2.0
  
  # Location Services (for web dashboard only)
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0
  
  # Maps (for web dashboard only)
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.4+2
  
  # Notifications (for web dashboard only)
  flutter_local_notifications: ^16.3.0
  
  # Storage (for web dashboard only)
  shared_preferences: ^2.2.2
  
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
