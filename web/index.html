<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Rakshak — AI Safety Intelligence Platform">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Rakshak">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rakshak Sentinel</title>
  <script>
    // Tell Flutter the logical viewport is 390×844 on desktop
    // so it lays out as a phone, not a full-width page.
    (function () {
      var mobile = window.matchMedia('(max-width: 430px)').matches;
      if (!mobile) {
        Object.defineProperty(window, 'innerWidth',  { get: function() { return 390; }, configurable: true });
        Object.defineProperty(window, 'innerHeight', { get: function() { return 844; }, configurable: true });
      }
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d0d 100%);
    }

    /* ── Desktop: center Flutter in a phone-sized clip box ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Flutter renders into this element via hostElement.
       Constrain it to phone dimensions and clip it. */
    #flutter-target {
      position: relative;
      width: 390px;
      height: 844px;
      border-radius: 54px;
      overflow: hidden;
      flex-shrink: 0;
      /* Flutter's flt-glass-pane will be position:fixed inside here,
         but overflow:hidden on a positioned ancestor clips it. */
      isolation: isolate;
    }

    /* Decorative border shell — sits on top, pointer-events:none
       so it doesn't block Flutter touch/click events */
    #phone-shell {
      position: absolute;
      inset: 0;
      border-radius: 54px;
      border: 2px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.06),
        0 60px 140px rgba(0, 0, 0, 0.95),
        0 0 80px rgba(0, 200, 150, 0.06);
      pointer-events: none;
      z-index: 9999;
    }

    /* Dynamic island removed — no overlay on Flutter content */

    /* Power button */
    #phone-shell::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 180px;
      width: 3px;
      height: 70px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 0 3px 3px 0;
    }

    /* Volume buttons */
    #vol-up, #vol-down {
      position: absolute;
      left: -3px;
      width: 3px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px 0 0 3px;
      pointer-events: none;
    }
    #vol-up   { top: 155px; height: 36px; }
    #vol-down { top: 205px; height: 36px; }

    /* ── Mobile: full screen, no frame ── */
    @media (max-width: 430px) {
      html, body {
        background: #000;
      }
      #flutter-target {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
      }
      #phone-shell {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Flutter renders here — constrained to phone dimensions -->
  <div id="flutter-target">
    <!-- Decorative phone border overlay (pointer-events:none) -->
    <div id="phone-shell">
      <div id="vol-up"></div>
      <div id="vol-down"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js"></script>
  <script>
    window.addEventListener("load", function () {
      var target = document.getElementById("flutter-target");

      // Flutter 3.22+ API
      if (window._flutter && _flutter.loader && _flutter.loader.load) {
        _flutter.loader.load({
          serviceWorkerSettings: {
            serviceWorkerVersion: "{{flutter_service_worker_version}}",
          },
          onEntrypointLoaded: async function (engineInitializer) {
            var appRunner = await engineInitializer.initializeEngine({
              hostElement: target,
            });
            await appRunner.runApp();
          },
        });

      // Flutter 3.10–3.21 API
      } else if (window._flutter && _flutter.loader && _flutter.loader.loadEntrypoint) {
        _flutter.loader.loadEntrypoint({
          serviceWorker: {
            serviceWorkerVersion: "{{flutter_service_worker_version}}",
          },
          onEntrypointLoaded: async function (engineInitializer) {
            var appRunner = await engineInitializer.initializeEngine({
              hostElement: target,
            });
            await appRunner.runApp();
          },
        });
      }
    });
  </script>
</body>
</html>
